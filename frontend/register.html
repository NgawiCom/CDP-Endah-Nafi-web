<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register E.C.H.O Monitoring</title>
    <meta name="description" content="Halaman registrasi E.C.H.O Monitoring.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-brand-panel" aria-label="E.C.H.O Monitoring">
        <a class="brand auth-brand" href="index.html" aria-label="E.C.H.O Monitoring">
          <span class="brand-mark">E</span>
          <span>
            <strong>E.C.H.O</strong>
            <small>Monitoring</small>
          </span>
        </a>
        <div class="auth-brand-copy">
          <p>Akun baru</p>
          <h1>Registrasi Pengguna</h1>
        </div>
      </section>

      <section class="auth-card" aria-labelledby="registerTitle">
        <div class="auth-card-header">
          <span class="card-label">Register</span>
          <h2 id="registerTitle">Buat Akun</h2>
        </div>

        <form class="auth-form" data-auth-redirect="login.html">
          <label>
            <span>Nama Lengkap</span>
            <input type="text" name="name" autocomplete="name" required>
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label>
            <span>Peran</span>
            <select name="role" required>
              <option value="">Pilih peran</option>
              <option value="operator">Operator</option>
              <option value="dokter">Dokter</option>
              <option value="admin">Admin</option>
            </select>
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" autocomplete="new-password" required>
          </label>
          <label>
            <span>Konfirmasi Password</span>
            <input type="password" name="password_confirmation" autocomplete="new-password" required>
          </label>

          <div class="auth-form-row">
            <span>Sudah punya akun?</span>
            <a href="login.html">Masuk</a>
          </div>

          <button class="primary-button auth-submit" type="submit">Daftar</button>
        </form>
      </section>
    </main>
    <script>
      document.querySelector("[data-auth-redirect]").addEventListener("submit", (event) => {
        event.preventDefault();
        window.location.href = event.currentTarget.dataset.authRedirect;
      });
    </script>
  </body>
</html>
