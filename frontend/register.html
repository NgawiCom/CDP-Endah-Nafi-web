<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register E.C.H.O Monitoring</title>
    <meta name="description" content="Halaman registrasi E.C.H.O Monitoring.">
    <link rel="stylesheet" href="styles.css">
    <script>
      if (localStorage.getItem("echo_token")) {
        window.location.replace("index.html");
      }
    </script>
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-brand-panel" aria-label="E.C.H.O Monitoring">
        <a class="brand auth-brand" href="index.html" aria-label="E.C.H.O Monitoring">
          <span class="brand-mark">E</span>
          <span>
            <strong>E.C.H.O</strong>
            <small>Monitoring</small>
          </span>
        </a>
        <div class="auth-brand-copy">
          <p>Akun baru</p>
          <h1>Registrasi Pengguna</h1>
        </div>
      </section>

      <section class="auth-card" aria-labelledby="registerTitle">
        <div class="auth-card-header">
          <span class="card-label">Register</span>
          <h2 id="registerTitle">Buat Akun</h2>
        </div>

        <form class="auth-form" id="registerForm" novalidate>
          <label>
            <span>Nama Lengkap</span>
            <input type="text" name="name" autocomplete="name" required>
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label>
            <span>Peran</span>
            <select name="role" required>
              <option value="">Pilih peran</option>
              <option value="operator">Operator</option>
              <option value="dokter">Dokter</option>
              <option value="admin">Admin</option>
            </select>
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" autocomplete="new-password" required minlength="6">
          </label>
          <label>
            <span>Konfirmasi Password</span>
            <input type="password" name="password_confirmation" autocomplete="new-password" required>
          </label>

          <div class="auth-form-row">
            <span>Sudah punya akun?</span>
            <a href="login.html">Masuk</a>
          </div>

          <p
            id="registerError"
            role="alert"
            aria-live="polite"
            style="display:none;margin:0;color:#d64545;font-size:0.9rem;font-weight:700;"
          ></p>

          <button class="primary-button auth-submit" type="submit">Daftar</button>
          
          <div style="text-align: center; margin-top: 16px;">
            <p style="margin: 0 0 8px 0; font-size: 14px; color: #61727d;">
              Atau akses langsung ke:
            </p>
            <a href="index.html" class="primary-button" style="display: inline-block; margin: 8px 0; padding: 10px 24px; text-decoration: none; border-radius: 8px;">Dashboard</a>
          </div>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById("registerForm");
      const errorEl = document.getElementById("registerError");

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = "block";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(form));
        const btn = form.querySelector("button[type=submit]");

        if (data.password !== data.password_confirmation) {
          showError("Konfirmasi password tidak cocok.");
          return;
        }
        if (data.password.length < 6) {
          showError("Password minimal 6 karakter.");
          return;
        }

        btn.disabled = true;
        errorEl.style.display = "none";

        try {
          const res = await fetch("/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: data.name,
              email: data.email,
              role: data.role,
              password: data.password,
            }),
          });
          const payload = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(payload.error || "Registrasi gagal.");
          window.location.replace("login.html");
        } catch (err) {
          showError(err.message || "Terjadi kesalahan jaringan.");
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
