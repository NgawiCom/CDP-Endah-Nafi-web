<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login E.C.H.O Monitoring</title>
    <meta name="description" content="Halaman login E.C.H.O Monitoring.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-brand-panel" aria-label="E.C.H.O Monitoring">
        <a class="brand auth-brand" href="index.html" aria-label="E.C.H.O Monitoring">
          <span class="brand-mark">E</span>
          <span>
            <strong>E.C.H.O</strong>
            <small>Monitoring</small>
          </span>
        </a>
        <div class="auth-brand-copy">
          <p>Dashboard pasien</p>
          <h1>Masuk ke Sistem Monitoring</h1>
        </div>
      </section>

      <section class="auth-card" aria-labelledby="loginTitle">
        <div class="auth-card-header">
          <span class="card-label">Login</span>
          <h2 id="loginTitle">Masuk Akun</h2>
        </div>

        <form class="auth-form" id="loginForm" novalidate>
          <label>
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" autocomplete="current-password" required>
          </label>

          <div class="auth-form-row">
            <label class="auth-check">
              <input type="checkbox" name="remember">
              <span>Ingat saya</span>
            </label>
            <a href="register.html">Daftar akun</a>
          </div>

          <p
            id="loginError"
            role="alert"
            aria-live="polite"
            style="display:none;margin:0;color:#d64545;font-size:0.9rem;font-weight:700;"
          ></p>

          <button class="primary-button auth-submit" type="submit">Masuk</button>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const errorEl = document.getElementById("loginError");

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = "block";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(form));
        const btn = form.querySelector("button[type=submit]");

        btn.disabled = true;
        errorEl.style.display = "none";

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: data.email, password: data.password }),
          });
          const payload = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(payload.error || "Login gagal.");
          localStorage.setItem("echo_token", payload.token);
          window.location.replace("index.html");
        } catch (err) {
          showError(err.message || "Terjadi kesalahan jaringan.");
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
